{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">
                Register
            </div>

            <div class="card-body">

                <form id="registerForm">

                    {% csrf_token %}

                   
                    <input type="text"
                           name="first_name"
                           id="first_name"
                           class="form-control mb-1"
                           placeholder="First Name" autocomplete="off">

                    <small class="text-danger" id="firstNameError"></small>

                    
                    <input type="text"
                           name="last_name"
                           id="last_name"
                           class="form-control mb-1 mt-2"
                           placeholder="Last Name" autocomplete="off">

                    <small class="text-danger" id="lastNameError"></small>

                   
                    <input type="text"
                           name="username"
                           id="username"
                           class="form-control mb-1 mt-2"
                           placeholder="Username" autocomplete="off">

                    <small class="text-danger" id="usernameError"></small>

                  
                    <input type="email"
                           name="email"
                           id="email"
                           class="form-control mb-1 mt-2"
                           placeholder="Email" autocomplete="off">

                    <small class="text-danger" id="emailError"></small>

                 
                    <input type="text"
                           name="phone"
                           id="phone"
                           class="form-control mb-1 mt-2"
                           placeholder="Phone Number" autocomplete="off">

                    <small class="text-danger" id="phoneError"></small>

                    <select name="role"
                            id="role"
                            class="form-control mb-1 mt-2">

                        <option value="">Select Role</option>

                        <option value="ADMIN">
                            Admin
                        </option>

                        <option value="INVENTORY MANAGER">
                            Inventory Manager
                        </option>

                        <option value="STAFF">
                            Staff User
                        </option>

                    </select>

                    <small class="text-danger" id="roleError"></small>

                    <input type="password"
                           name="password1"
                           id="password1"
                           class="form-control mb-1 mt-2"
                           placeholder="Password" autocomplete="off">

                    <small class="text-danger" id="password1Error"></small>

                    <input type="password"
                           name="password2"
                           id="password2"
                           class="form-control mb-1 mt-2"
                           placeholder="Confirm Password" autocomplete="off">

                    <small class="text-danger" id="password2Error"></small>

                    <button type="submit"
                            class="btn btn-primary w-100 mt-3">

                        Register

                    </button>

                </form>

                <div id="registerMessage" class="mt-3"></div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
